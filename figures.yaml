title: "Ábrakészlet 2026"
subtitle: ""
author: ""
date: "2026"

# Minden bejegyzés egy ábra vagy egy szakaszcím.
# A type lehet:
#   - datawrapper  (id vagy src kötelező)
#   - image        (src kötelező; lehet helyi PNG vagy URL)
#   - section      (címlap a fejezetek elválasztásához; nem kap számot)
#
# Az "1. ábra" stb. számozást a build.py automatikusan generálja
# az itt megadott sorrend alapján. A datawrapper embedek címe a chartban van,
# ezért ide ne tegyél címet.
#
# Tipp: a Datawrapper "Embed" panelén az "Embed code" mutatja az iframe src-t,
# de elég csak a chart ID-t megadni (pl. AbCdE).

figures:
  - type: section
    title: "Makrogazdaság"

  - type: datawrapper
    id: DDEsU
    height: 500
    caption: Beruházások alakulása 2015-2025 között

  - type: datawrapper
    id: xCQYg
    height: 500
    caption: Háztartási fogyasztás alakulása

  - type: datawrapper
    id: GQ2o7
    height: 500
    caption: Infláció háború előtt és után

  - type: datawrapper
    id: ayvvt
    height: 500
    caption: Államkötvényhozamok alakulása

  - type: image
    src: https://pcdn.hu/articles/images-o/k/a/m/kamat250509-harom-751103.jpg
    alt: "Államadósság és kamatteher a GDP arányában"

  - type: datawrapper
    id: vNB2q
    height: 600
    caption: Ipari termelés Magyarországon és Németországban

  - type: section
    title: "Munkaerőpiac"

  # Teljes Datawrapper URL is megadható src-ként:
  # - type: datawrapper
  #   src: "https://datawrapper.dwcdn.net/AbCdE/1/"
  #   height: 600
